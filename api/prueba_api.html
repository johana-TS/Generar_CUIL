<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de API CUIL</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 6px; min-height: 50px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Prueba API CUIL</h2>
        <div class="form-group">
            <label for="dni">DNI:</label>
            <input type="number" id="dni" placeholder="Ej: 12345678" value="20000000">
        </div>
        <div class="form-group">
            <label for="sexo">Sexo:</label>
            <select id="sexo">
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
            </select>
        </div>
        <div class="form-group">
            <label for="endpoint">Endpoint:</label>
            <input type="text" id="endpoint" value="http://localhost:8000/calcular">
        </div>
        <button onclick="probarAPI()">Calcular CUIL</button>
        <div id="resultado"></div>
    </div>

    <script>
        async function probarAPI() {
            const dni = document.getElementById('dni').value;
            const sexo = document.getElementById('sexo').value;
            const endpoint = document.getElementById('endpoint').value;
            const divResultado = document.getElementById('resultado');
            
            divResultado.innerHTML = 'Cargando...';
            divResultado.className = '';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nombre: "Prueba",
                        apellido: "Usuario",
                        dni: parseInt(dni),
                        sexo: sexo
                    })
                });

                const data = await response.json();
                
                if (response.ok && data.success) {
                    divResultado.className = 'success';
                    divResultado.innerHTML = `<strong>CUIL Generado:</strong> ${data.data.cuil}`;
                } else {
                    divResultado.className = 'error';
                    divResultado.innerHTML = `<strong>Error:</strong> ${data.error || 'Fallo en la petición'}`;
                }
            } catch (error) {
                divResultado.className = 'error';
                divResultado.innerHTML = `<strong>Error de Red:</strong> ${error.message}<br><small>Verifica que el servidor esté corriendo en la URL indicada.</small>`;
                console.error('Error completo:', error);
            }
        }
    </script>
</body>
</html>
